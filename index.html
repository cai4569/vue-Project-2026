<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>极简购物车</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .item { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        button { padding: 5px 10px; cursor: pointer; }
        #cart-area { background: #f9f9f9; padding: 15px; border-top: 2px solid #333; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>🛒 简易购物车</h1>

    <!-- 商品列表 -->
    <div id="product-list"></div>

    <!-- 购物车区域 -->
    <div id="cart-area">
        <h3>购物车内容：</h3>
        <ul id="cart-list" style="padding-left: 20px;"></ul>
        <p><strong>总计：¥<span id="total">0</span></strong></p>
    </div>

    <script>
        // 1. 数据
        const products = [
            { id: 1, name: "苹果", price: 5 },
            { id: 2, name: "香蕉", price: 3 },
            { id: 3, name: "牛奶", price: 12 }
        ];
        
        let cart = []; // 购物车数组

        // 2. 渲染商品列表
        const listDiv = document.getElementById('product-list');
        products.forEach(p => {
            listDiv.innerHTML += `
                <div class="item">
                    <span>${p.name} - ¥${p.price}</span>
                    <button onclick="add(${p.id})">加入购物车</button>
                </div>
            `;
        });

        // 3. 核心功能：添加商品
        function add(id) {
            const product = products.find(p => p.id === id);
            cart.push(product); // 简单粗暴，直接推进去
            renderCart();       // 重新渲染购物车
        }

        // 4. 渲染购物车和计算总价
        function renderCart() {
            const cartList = document.getElementById('cart-list');
            const totalSpan = document.getElementById('total');
            
            // 清空当前列表
            cartList.innerHTML = '';
            
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                // 显示商品名，点击可删除（可选基础功能）
                cartList.innerHTML += `<li>${item.name} (¥${item.price}) <button onclick="remove(${index})" style="color:red;font-size:12px;">x</button></li>`;
            });

            totalSpan.innerText = total;
        }

        // 5. 删除商品 (基础功能补充)
        function remove(index) {
            cart.splice(index, 1); // 从数组删掉一个
            renderCart();
        }
    </script>
</body>
</html>
